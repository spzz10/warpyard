[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = ["alembic"]  # generated scaffolding + autogenerated migrations

[tool.ruff.lint]
select = ["E", "F", "I", "B", "S", "UP", "SIM"]
ignore = [
    "B008",   # FastAPI Depends() in defaults
    "E501",   # long lines — formatter's job
    "E712",   # SQLAlchemy filter comparisons
    "S101",   # asserts in tests
    "S104",   # bind-all false positives
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S105", "S106"]
# edge agent is a trusted ops script: it fetches the control-plane URL over WG (S310)
# and runs `caddy` from PATH via systemd (S607) — both intentional.
"edge/*" = ["S310", "S603", "S607", "SIM105", "SIM115", "PLW1514"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]  # CI invokes bare `pytest`; make `import app` work without an editable install
