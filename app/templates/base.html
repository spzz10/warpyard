<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>{% block title %}Warpyard{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script src="/static/htmx.min.js"></script>
<script src="/static/idiomorph-ext.min.js"></script>
<style>
  :root{
    --bg:#0a0c10; --surface:#111318; --surface-2:#161922; --panel-2:#161922; --raise:#1c212b;
    --line:#20242d; --line-2:#2b313c;
    --text:#e7eaf0; --muted:#97a1b2; --dim:#7f89a0; /* dim ≥4.5:1 on all surfaces (AA) */
    --accent:#6a7dff; --accent-2:#93a2ff; --accent-soft:rgba(106,125,255,.13);
    --green:#3fc98a; --green-soft:rgba(63,201,138,.13);
    --amber:#eab24a; --amber-soft:rgba(234,178,74,.13);
    --red:#f2645f; --red-soft:rgba(242,100,95,.12);
    --r:10px; --r-lg:14px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 34px -22px rgba(0,0,0,.8);
    --sans:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, ui-sans-serif, system-ui, sans-serif;
    --mono:ui-monospace, "SF Mono", "JetBrains Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    min-height:100vh; display:flex; flex-direction:column;
    color:var(--text); font-family:var(--sans); font-size:14.5px; line-height:1.55;
    -webkit-font-smoothing:antialiased; letter-spacing:-.005em;
    background:
      radial-gradient(1100px 380px at 50% -180px, rgba(106,125,255,.07), transparent 70%),
      var(--bg);
    background-attachment:fixed;
  }
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums}
  a{color:var(--accent-2); text-decoration:none}
  a:hover{color:var(--text)}
  h1{letter-spacing:-.02em}
  ::selection{background:var(--accent-soft)}

  /* ---- top bar ---- */
  header.topbar{
    display:flex; align-items:center; gap:1.1rem; height:56px;
    padding:0 clamp(1rem,4vw,2rem);
    border-bottom:1px solid var(--line);
    background:rgba(10,12,16,.78); position:sticky; top:0; z-index:30; backdrop-filter:blur(14px) saturate(1.4);
  }
  .brand{display:flex; align-items:center; gap:.55rem; font-weight:650; letter-spacing:-.02em}
  .brand .logo{width:25px; height:25px; border-radius:7px; display:grid; place-items:center;
    background:linear-gradient(150deg,#8a99ff,#4c5bf0); box-shadow:0 4px 16px -5px var(--accent),
    0 0 0 1px rgba(138,153,255,.25) inset; flex:none}
  .brand .logo svg{width:15px; height:15px; display:block; filter:drop-shadow(0 1px 1px rgba(0,0,0,.25))}
  .brand .mark{font-size:1.04rem; color:var(--text)}
  .brand .mark b{font-weight:650} .brand .mark span{color:var(--accent-2)}
  nav.crumbs{margin-left:auto; display:flex; gap:.1rem; align-items:center; font-size:.875rem}
  nav.crumbs a{padding:.4rem .7rem; border-radius:8px; color:var(--muted); font-weight:500; transition:.14s}
  nav.crumbs a:hover{background:var(--surface-2); color:var(--text)}
  nav.crumbs a.on{color:var(--text); background:var(--surface-2)}
  nav.crumbs a.signout{color:var(--dim)} nav.crumbs a.signout:hover{color:var(--text); background:transparent}

  main{flex:1; width:100%; max-width:1080px; margin:0 auto; padding:clamp(1.5rem,4vw,2.4rem) clamp(1rem,4vw,1.8rem)}

  /* ---- page header ---- */
  .pagehead{display:flex; flex-wrap:wrap; align-items:flex-end; gap:1.2rem;
    padding-bottom:1.2rem; margin-bottom:1.5rem; border-bottom:1px solid var(--line)}
  .pagehead h1{margin:0; font-size:clamp(1.45rem,3vw,1.8rem); font-weight:600}
  .pagehead .sub{color:var(--muted); font-size:.92rem; margin-top:.35rem}
  .pagehead .sub .mono{color:var(--text)}

  /* ---- summary stats (inline, flat) ---- */
  .tally{display:flex; gap:1.6rem; margin-left:auto; align-items:baseline}
  .tally .cell{text-align:left}
  .tally .n{font:600 1.35rem/1 var(--sans); font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .tally .n.go{color:var(--green)}
  .tally .k{font:600 .58rem/1 var(--mono); letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-top:.45rem}

  /* ---- toolbar row ---- */
  .toolbar{display:flex; align-items:center; gap:.8rem; margin-bottom:1.1rem}
  .toolbar .spacer{margin-left:auto}

  /* ---- server list (rows, not cards) ---- */
  .list{border:1px solid var(--line); border-radius:var(--r-lg); background:var(--surface); overflow:hidden;
    box-shadow:var(--shadow)}
  .srv{display:flex; align-items:center; gap:1rem; padding:.9rem 1.1rem; border-top:1px solid var(--line);
    transition:background .14s}
  .srv:first-child{border-top:none}
  .srv:hover{background:var(--surface-2)}
  .srv-idy{min-width:0; display:flex; flex-direction:column; gap:.18rem; flex:1 1 auto}
  .srv-name{font-weight:600; font-size:1rem; color:var(--text); letter-spacing:-.01em; line-height:1.1}
  .srv-name:hover{color:var(--accent-2)}
  .srv-host{font-family:var(--mono); font-size:.77rem; color:var(--muted); word-break:break-all}
  .srv-host:hover{color:var(--accent-2)}
  .srv-specs{font-family:var(--mono); font-size:.75rem; color:var(--dim); white-space:nowrap; flex:none}
  .srv-status{flex:none}
  .srv-acts{display:flex; align-items:center; gap:.35rem; flex:none; flex-wrap:wrap; justify-content:flex-end}
  .srv-acts .btn{padding:.42rem .68rem; font-size:.78rem}
  @media(max-width:760px){
    .srv{flex-wrap:wrap; gap:.7rem}
    .srv-specs{display:none}
    .srv-idy{flex-basis:100%}
    .srv-acts{width:100%; justify-content:flex-start}
  }

  /* status chip */
  .chip{display:inline-flex; align-items:center; gap:.42rem; padding:.26rem .58rem; border-radius:7px;
    font:600 .68rem/1 var(--sans); letter-spacing:.01em; white-space:nowrap; border:1px solid transparent}
  .chip .dot{width:7px; height:7px; border-radius:50%; flex:none}
  .chip.go{color:var(--green); background:var(--green-soft); border-color:rgba(63,201,138,.22)}
  .chip.go .dot{background:var(--green); box-shadow:0 0 0 0 rgba(63,201,138,.5); animation:pulse 2.4s infinite}
  .chip.work{color:var(--amber); background:var(--amber-soft); border-color:rgba(234,178,74,.22)}
  .chip.work .dot{background:var(--amber); animation:blink 1s steps(2,jump-none) infinite}
  .chip.warn{color:var(--amber); background:var(--amber-soft); border-color:rgba(234,178,74,.22)}
  .chip.warn .dot{background:var(--amber)}
  .chip.bad{color:var(--red); background:var(--red-soft); border-color:rgba(242,100,95,.22)}
  .chip.bad .dot{background:var(--red)}
  .chip.idle{color:var(--muted); background:var(--surface-2); border-color:var(--line-2)}
  .chip.idle .dot{background:var(--dim)}
  /* lightweight inline status badge (invites) */
  .light{display:inline-flex; align-items:center; gap:.42rem; font-weight:600; font-size:.8rem}
  .light.go{color:var(--green)} .light.idle{color:var(--muted)}
  .dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex:none}
  .dot.go{background:var(--green)} .dot.idle{background:var(--dim)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,201,138,.5)}70%{box-shadow:0 0 0 5px rgba(63,201,138,0)}100%{box-shadow:0 0 0 0 rgba(63,201,138,0)}}
  @keyframes blink{50%{opacity:.4}}
  @media (prefers-reduced-motion:reduce){.dot{animation:none!important}}

  /* ---- buttons ---- */
  .btn{font:550 .82rem/1 var(--sans); padding:.5rem .85rem; border-radius:8px; cursor:pointer;
    border:1px solid var(--line-2); background:var(--surface-2); color:var(--text);
    display:inline-flex; align-items:center; gap:.4rem; transition:.14s; white-space:nowrap}
  .btn:hover{background:var(--raise); border-color:#3a4250}
  .btn:disabled{opacity:.5; cursor:not-allowed}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .btn.go{color:var(--green); border-color:rgba(63,201,138,.3)}
  .btn.go:hover{background:var(--green-soft); border-color:var(--green)}
  .btn.danger{color:var(--muted)}
  .btn.danger:hover{background:var(--red-soft); border-color:var(--red); color:var(--red)}
  .btn.primary{background:linear-gradient(180deg,#7c8bff,#5a6dff); border-color:#5a6dff; color:#fff; font-weight:600;
    box-shadow:0 1px 0 rgba(255,255,255,.18) inset, 0 6px 16px -9px var(--accent)}
  .btn.primary:hover{background:linear-gradient(180deg,#8b98ff,#6577ff); border-color:#6577ff}
  .btn.ghost{background:transparent; border-color:transparent; color:var(--muted)}
  .btn.ghost:hover{background:var(--surface-2); color:var(--text)}
  .btn-row{display:flex; gap:.55rem; flex-wrap:wrap; margin-top:1.2rem; align-items:center}

  /* ---- empty state ---- */
  .empty{text-align:center; padding:3.4rem 1rem; border:1px solid var(--line);
    border-radius:var(--r-lg); color:var(--muted); background:var(--surface)}
  .empty .big{font-size:1.2rem; color:var(--text); margin-bottom:.4rem; font-weight:600}

  /* ---- forms / panels ---- */
  .panel{max-width:560px; margin:0 auto; border:1px solid var(--line); border-radius:var(--r-lg);
    background:var(--surface); box-shadow:var(--shadow); padding:1.8rem}
  label.fld{display:block; margin:1.1rem 0 .4rem; font:600 .62rem/1 var(--mono);
    letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  input,select,textarea{width:100%; padding:.68rem .85rem; border-radius:9px; border:1px solid var(--line-2);
    background:var(--bg); color:var(--text); font:400 .92rem var(--sans); transition:.14s}
  textarea.mono,input.mono{font-family:var(--mono); font-size:.85rem}
  input::placeholder,textarea::placeholder{color:var(--dim)}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .opts{display:grid; gap:.55rem; grid-template-columns:repeat(auto-fit,minmax(158px,1fr)); margin-top:.2rem}
  .opt{border:1px solid var(--line-2); border-radius:11px; padding:.8rem .9rem; cursor:pointer; background:var(--bg); transition:.14s}
  .opt:hover{border-color:#3a4250}
  /* keep radios in the tab order + a11y tree (display:none removed them) — hide visually only */
  .opt input{position:absolute; width:1px; height:1px; margin:-1px; padding:0; border:0;
    clip:rect(0 0 0 0); clip-path:inset(50%); overflow:hidden; white-space:nowrap}
  .opt{position:relative}
  .opt:has(input:checked){border-color:var(--accent); background:var(--accent-soft); box-shadow:0 0 0 1px var(--accent)}
  .opt:has(input:focus-visible){outline:2px solid var(--accent); outline-offset:2px}
  .opt .nm{font-weight:600}
  .opt .meta{font-family:var(--mono); font-size:.72rem; color:var(--muted); margin-top:.3rem; line-height:1.5}
  .err{background:var(--red-soft); border:1px solid rgba(242,100,95,.36); color:#ffc9c9;
    padding:.7rem .9rem; border-radius:9px; font-size:.88rem; margin-bottom:.5rem}

  /* ---- tables ---- */
  table.keys{width:100%; border-collapse:collapse}
  table.keys td,table.keys th{text-align:left; padding:.72rem .5rem; border-bottom:1px solid var(--line)}
  table.keys tr:last-child td{border-bottom:none}
  table.keys th{font:600 .58rem/1 var(--mono); letter-spacing:.13em; text-transform:uppercase; color:var(--dim)}
  .fp{font-family:var(--mono); font-size:.76rem; color:var(--muted); word-break:break-all}

  /* ---- detail: definition rows + sections ---- */
  .section{margin-top:2rem}
  .lbl{font:600 .6rem/1 var(--mono); letter-spacing:.15em; text-transform:uppercase; color:var(--dim); margin:0 0 .85rem}

  /* ---- charts (wycharts.js) — server Metrics tab + admin Host page ---- */
  .tfrow{display:flex; gap:.35rem; margin-bottom:1rem}
  .tfrow .btn[aria-pressed="true"]{background:var(--accent-soft); color:var(--accent-2); border-color:transparent}
  .mx-grid{display:grid; grid-template-columns:1fr 1fr; gap:.9rem}
  .mx-wide{grid-column:1/-1}
  @media(max-width:640px){ .mx-grid{grid-template-columns:1fr} }
  .mx-card{position:relative; border:1px solid var(--line); border-radius:var(--r); background:var(--surface); padding:.85rem .95rem}
  .mx-loading .mx-plot{opacity:.5; transition:opacity .15s}
  .mx-head{display:flex; align-items:baseline; justify-content:space-between; gap:.6rem; margin-bottom:.5rem}
  .mx-title{font-size:.8rem; color:var(--muted); font-weight:500}
  .mx-now{font-size:1.02rem; font-weight:600; letter-spacing:-.01em; white-space:nowrap; font-variant-numeric:normal}
  .mx-plot{position:relative; min-height:150px}
  .mx-plot svg{display:block; width:100%; height:auto}
  .mx-tick{fill:var(--dim); font-size:10px; font-family:var(--mono)}
  .mx-legend{display:flex; gap:1rem; margin-top:.45rem}
  .mx-key{display:inline-flex; align-items:center; gap:.4rem; font-size:.75rem; color:var(--muted)}
  .mx-key i{width:12px; height:2px; border-radius:1px; display:inline-block}
  .mx-empty{color:var(--dim); font-size:.85rem; padding:2.6rem 0; text-align:center}
  .mx-tip{position:absolute; z-index:5; pointer-events:none; background:var(--raise); border:1px solid var(--line-2);
    border-radius:8px; padding:.45rem .6rem; font-size:.75rem; box-shadow:var(--shadow); min-width:88px}
  .mx-tip-t{color:var(--dim); font-family:var(--mono); font-size:.68rem; margin-bottom:.25rem}
  .mx-tip-row{display:flex; align-items:center; gap:.4rem; color:var(--muted); line-height:1.5}
  .mx-tip-row i{width:10px; height:2px; border-radius:1px; flex:none}
  .mx-tip-row b{color:var(--text); font-weight:600}
  .deflist{border-top:1px solid var(--line)}
  .def{display:grid; grid-template-columns:130px 1fr; gap:.6rem 1.2rem; padding:1rem 0; border-bottom:1px solid var(--line)}
  .def .dt{font:600 .68rem/1.4 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--muted); padding-top:.15rem}
  .def .dd{min-width:0}
  .def .val{font-size:.92rem; color:var(--text); word-break:break-all}
  .def .val a{color:var(--accent-2)}
  code.copy{cursor:pointer; background:var(--bg); padding:.42rem .6rem; border-radius:7px; border:1px solid var(--line-2);
    color:var(--text); font-family:var(--mono); font-size:.82rem; display:inline-block; word-break:break-all}
  code.copy:hover{border-color:var(--accent-2)}
  code.copy:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .sr-only{position:absolute; width:1px; height:1px; margin:-1px; padding:0; border:0;
    clip:rect(0 0 0 0); clip-path:inset(50%); overflow:hidden; white-space:nowrap}
  .note{color:var(--dim); font-size:.78rem; margin:.5rem 0 0; line-height:1.5}
  .note a{color:var(--accent-2)}
  @media(max-width:560px){ .def{grid-template-columns:1fr; gap:.3rem} }

  .log .row{display:flex; gap:.9rem; padding:.45rem 0; font-family:var(--mono); font-size:.79rem; border-bottom:1px solid var(--line)}
  .log .row .a{color:var(--text); min-width:160px}
  .log .row .s{color:var(--muted)}

  /* ---- footer ---- */
  footer.foot{border-top:1px solid var(--line); margin-top:3.5rem; background:linear-gradient(180deg,transparent,rgba(106,125,255,.03))}
  .foot-in{max-width:1080px; margin:0 auto; padding:1.5rem clamp(1rem,4vw,1.8rem); display:flex; align-items:center;
    gap:.9rem; flex-wrap:wrap; font-size:.85rem; color:var(--dim)}
  .foot-tag{color:var(--muted)}
  .foot-links{margin-left:auto; display:flex; gap:1.3rem}
  .foot-links a{color:var(--muted); font-weight:500} .foot-links a:hover{color:var(--text)}
  @media(max-width:600px){ .tally{width:100%; margin:1rem 0 0; gap:1.3rem} .foot-links{margin-left:0; width:100%} }
</style>
</head>
<body>
<header class="topbar">
  <a class="brand" href="/" style="color:inherit">
    <span class="logo"><svg viewBox="0 0 24 24"><path d="M4.5 8 8 17 12 5 16 17 19.5 8" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    <span class="mark"><b>Warp</b><span>yard</span></span>
  </a>
  {% if user %}
  <nav class="crumbs">
    <a href="/" class="{{ 'on' if nav=='servers' }}">Servers</a>
    <a href="/board" class="{{ 'on' if nav=='board' }}">Board</a>
    <a href="/host" class="{{ 'on' if nav=='host' }}">Host</a>
    <a href="/account" class="{{ 'on' if nav=='account' }}">Account</a>
    <a href="/docs" class="{{ 'on' if nav=='docs' }}">Docs</a>
    {% if user.is_admin %}<a href="/invites" class="{{ 'on' if nav=='invites' }}">Invites</a>{% endif %}
    <a href="/logout" class="signout">Sign out</a>
  </nav>
  {% endif %}
</header>
<main>
{% block content %}{% endblock %}
</main>
{% if user %}
<footer class="foot">
  <div class="foot-in">
    <span class="foot-tag">Warpyard — cloud servers, self-hosted.</span>
    <nav class="foot-links">
      <a href="/docs">API &amp; MCP</a>
      <a href="/docs/platform">Platform handbook</a>
      <a href="/">Dashboard</a>
    </nav>
  </div>
</footer>
{% endif %}
<div id="copy-live" class="sr-only" aria-live="polite"></div>
<script>
  // click-to-copy: keyboard-operable (real button semantics) + announced to screen readers
  document.querySelectorAll('.copy').forEach(el => {
    el.setAttribute('tabindex', '0');
    el.setAttribute('role', 'button');
    if(!el.title) el.title = 'Copy to clipboard';
    const doCopy = () => {
      navigator.clipboard.writeText(el.dataset.copy);
      const live = document.getElementById('copy-live');
      if(live) live.textContent = 'Copied to clipboard';
      const old = el.textContent; el.textContent = 'copied ✓';
      setTimeout(() => { el.textContent = old; if(live) live.textContent = ''; }, 1200);
    };
    el.addEventListener('click', doCopy);
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); doCopy(); }
    });
  });
</script>
</body>
</html>
