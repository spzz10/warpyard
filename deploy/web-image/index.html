<!doctype html><meta charset="utf-8"><title>Ready to deploy — Warpyard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a0c10;color:#e7eaf0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
  .card{max-width:460px;padding:2.4rem;text-align:center}
  .dot{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,#6a7dff,#4c5bf0);margin:0 auto 1rem}
  h1{font-weight:600;font-size:1.5rem;margin:0 0 .5rem}
  p{color:#97a1b2;line-height:1.6}
  code{font-family:ui-monospace,Menlo,monospace;background:#161922;padding:.15rem .4rem;border-radius:6px;color:#93a2ff}
</style>
<div class="card">
  <div class="dot"></div>
  <h1>Your server is ready</h1>
  <p>Push a git repo to deploy your site here. From the Warpyard dashboard, copy the
  <code>git remote add</code> line under <b>Deploy</b>, then <code>git push warpyard main</code>.</p>
</div>
