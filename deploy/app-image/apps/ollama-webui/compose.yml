# Ollama + Open WebUI — local AI chat. CPU-only on this host: stick to small models
# (llama3.2:3b, qwen2.5:3b, phi3) — pull them from the WebUI's model panel.
services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "80:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WY_SECRET}
    volumes:
      - open-webui:/app/backend/data

volumes:
  ollama:
  open-webui:
